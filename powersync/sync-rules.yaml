# PowerSync sync rules for Multitask.
# Paste into the PowerSync dashboard (Instance → Sync Rules) and deploy.
#
# One bucket per user, keyed by the Supabase Auth user id from the JWT —
# this mirrors the RLS policies: every device syncs exactly its owner's
# rows and nothing else. Writes still go through Supabase with RLS
# enforcing the same wall server-side.

bucket_definitions:
  user_data:
    parameters: select request.user_id() as user_id
    data:
      # task's primary key is the legacy task_id — PowerSync requires every
      # query to output an "id" column, hence the alias. The other tables'
      # PKs are already named id.
      - select task_id as id, * from task where user_uuid = bucket.user_id
      - select * from recurring_task where user_uuid = bucket.user_id
      - select * from recurring_completion where user_uuid = bucket.user_id
      - select * from event where user_uuid = bucket.user_id
