server.port=${PORT:8080}
logging.level.org.atmosphere=warn

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=true

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.jry

# Let Hibernate update the schema automatically or create it if it does not exist.
#
# DO NOT DO THIS IN PRODUCTION!
#
# Instead, use Flyway or another controlled way of managing your database schema.
# See https://vaadin.com/docs/latest/building-apps/forms-data/add-flyway for instructions.
spring.jpa.hibernate.ddl-auto=update

# 1. Tell Spring to WAIT until Hibernate creates the tables before running data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# =========================================================================
# Connection pool (HikariCP) tuned for Supabase's TRANSACTION-mode pooler
# (Supavisor, port 6543). Transaction mode shares a small number of real
# Postgres connections across many clients, which fixes the
# "max clients reached in session mode" startup failure.
#
# IMPORTANT: transaction mode does NOT support server-side prepared
# statements. The PostgreSQL JDBC driver uses them by default, so we disable
# them in the JDBC URL via ?prepareThreshold=0 — OR set it here so it applies
# regardless of how DB_URL is written. We set the driver property below.
# =========================================================================
# Disable server-side prepared statements (required for transaction-mode pooling).
spring.datasource.hikari.data-source-properties.prepareThreshold=0
# Keep the app's pool small — the pooler multiplexes, so the app needs few.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
# Recycle connections before the pooler/Supabase recycles them under us.
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.connection-timeout=30000
# NOTE: we deliberately do NOT set a connection-test-query here. Hikari's
# default JDBC isValid() check works fine and avoids extra round-trips through
# the transaction pooler.
# =========================================================================
# Mail (Gmail SMTP) for email verification on signup.
# Credentials are loaded from environment variables — never commit them.
# Required env vars: MAIL_USERNAME (the full Gmail address) and MAIL_PASSWORD
# (the 16-character Google app password, NOT the regular Gmail password).
# =========================================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Verification-link base URL. Defaults to localhost for dev; set APP_BASE_URL
# on Render to your real domain so production emails link correctly.
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Display name on the "From" header (the address itself comes from MAIL_USERNAME).
app.mail.from-name=TaskApp Support

# How long a verification token stays valid before expiring.
app.verification.token-validity-hours=24
